version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: zen_pg
    restart: always
    environment:
      POSTGRES_USER: zen
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: zenstudio
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
